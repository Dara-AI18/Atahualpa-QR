<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Habaspamba · Guía Turística</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #f0f4f0;
    --bg2:       #e2e8e2;
    --surface:   #ffffff;
    --border:    #cdd8cd;
    --ink:       #1a2a1a;
    --ink2:      #4a5e4a;
    --ink3:      #8a9e8a;
    --gold:      #c49a2a;
    --gold-lt:   #faf0d0;
    --teal:      #2a7a6a;
    --teal-mid:  #3a9a86;
    --teal-lt:   #d0eeea;
    --maps-blue: #1a73e8;
    --fb-blue:   #1877f2;
    --radius:    14px;
    --shadow:    0 2px 16px rgba(26,42,26,.08);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg2);
    color: var(--ink);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  .page-shell {
    max-width: 600px;
    margin: 0 auto;
    background: var(--bg);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 60px rgba(0,0,0,.12);
    width: 100%;
    position: relative;
    overflow: hidden;
  }

  /* ── HEADER ─────────────────────────────────────────────────────── */
  header {
    background: linear-gradient(150deg, #1a4a3a 0%, #2a7a6a 60%, #1e5a4a 100%);
    padding: 16px 20px 14px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 80% 50%, rgba(196,154,42,.2) 0%, transparent 60%);
    pointer-events: none;
  }
  .header-inner {
    max-width: 560px; margin: 0 auto;
    display: flex; align-items: center; gap: 12px;
    position: relative;
  }
  .logo-wrap {
    width: 56px; height: 56px; border-radius: 50%;
    background: #fff;
    padding: 3px;
    box-shadow: 0 2px 14px rgba(0,0,0,.25), 0 0 0 2px rgba(196,154,42,.5);
    flex-shrink: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-wrap img {
    width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
  }
  .logo-fallback { font-size: 26px; }
  .header-text { flex: 1; min-width: 0; }
  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700; color: #fff;
    line-height: 1.15; letter-spacing: -.2px;
  }
  .header-text .subtitle {
    font-size: 10.5px; color: rgba(255,255,255,.65);
    font-weight: 300; margin-top: 2px; letter-spacing: .3px;
  }
  .header-text .bot-name {
    font-size: 11px; color: rgba(255,255,255,.85);
    font-weight: 500; margin-top: 3px; letter-spacing: .2px;
    display: flex; align-items: center; gap: 4px;
  }
  .bot-dot { width: 6px; height: 6px; border-radius: 50%; background: #6ee7b7; display: inline-block; }
  .header-right {
    margin-left: auto;
    display: flex; flex-direction: column; align-items: flex-end; gap: 5px;
    flex-shrink: 0;
  }
  .lang-btns { display: flex; gap: 5px; }
  .lang-btn {
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.22);
    color: rgba(255,255,255,.7); border-radius: 20px;
    padding: 4px 10px; font-size: 10.5px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all .2s; white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
  }
  .lang-btn:hover { background: rgba(255,255,255,.22); color: #fff; }
  .lang-btn.active {
    background: rgba(255,255,255,.28); color: #fff;
    border-color: rgba(255,255,255,.5); font-weight: 500;
  }
  .header-badge {
    font-size: 9px; color: rgba(255,255,255,.45);
    letter-spacing: .4px; text-align: right; line-height: 1.4;
  }

  /* ── STATUS BAR ──────────────────────────────────────────────────── */
  .status-bar {
    background: #123a2a;
    padding: 4px 20px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    flex-shrink: 0;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #6ee7b7;
    animation: pulse-dot 2s ease-in-out infinite; flex-shrink: 0;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.35} }
  .status-text { font-size: 10px; color: rgba(255,255,255,.5); letter-spacing: .3px; }

  /* ── CHIPS ───────────────────────────────────────────────────────── */
  .chips-outer { padding: 10px 0 0; position: relative; flex-shrink: 0; }
  .chips-arrow {
    position: absolute; top: 50%; transform: translateY(-20%);
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    box-shadow: 0 1px 6px rgba(0,0,0,.1);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    z-index: 3; color: var(--ink2); font-size: 15px;
    transition: all .15s; user-select: none;
    opacity: 0; pointer-events: none;
  }
  .chips-arrow.visible { opacity: 1; pointer-events: auto; }
  .chips-arrow:hover { background: var(--teal-lt); color: var(--teal); }
  .chips-arrow.arr-left  { left: 4px; }
  .chips-arrow.arr-right { right: 4px; }
  .chips-row {
    display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
    padding: 0 18px 2px; scroll-behavior: smooth;
  }
  .chips-row::-webkit-scrollbar { display: none; }
  .chip {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 13px; font-size: 12px;
    cursor: pointer; white-space: nowrap; transition: all .18s;
    color: var(--ink2); flex-shrink: 0; font-family: 'DM Sans', sans-serif;
  }
  .chip:hover  { background: var(--teal-lt); border-color: var(--teal-mid); color: var(--teal); }
  .chip.active { background: var(--teal); border-color: var(--teal); color: #fff; }

  /* ── CHAT ────────────────────────────────────────────────────────── */
  .chat-wrap {
    flex: 1; display: flex; flex-direction: column;
    padding: 10px 14px 0; min-height: 0; overflow: hidden;
  }
  .messages {
    flex: 1; overflow-y: auto; display: flex;
    flex-direction: column; gap: 10px; padding-bottom: 10px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; gap: 8px; align-items: flex-end; max-width: 94%; animation: fadeUp .22s ease; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:none} }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; overflow: hidden;
  }
  .bot .avatar {
    background: var(--teal);
    box-shadow: 0 2px 8px rgba(42,122,106,.3);
  }
  .bot .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .user .avatar { background: var(--gold); color: #fff; font-size: 10px; font-weight: 500; }

  .bubble {
    padding: 9px 13px; border-radius: var(--radius); font-size: 13.5px;
    line-height: 1.65; box-shadow: var(--shadow);
  }
  .bot  .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: var(--ink); }
  .user .bubble { background: var(--teal); color: #fff; border-bottom-right-radius: 4px; }
  .bubble strong { font-weight: 500; }
  .bubble ul { margin: 6px 0 0 16px; }
  .bubble li { margin-bottom: 3px; }

  /* ── BOTONES MAPA Y FB ───────────────────────────────────────────── */
  .bubble .maps-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--maps-blue); color: #fff;
    border: none; border-radius: 10px;
    padding: 5px 11px; font-size: 12px; font-weight: 500;
    cursor: pointer; margin: 4px 4px 0 0;
    font-family: 'DM Sans', sans-serif;
    transition: background .15s, transform .1s;
    box-shadow: 0 2px 8px rgba(26,115,232,.3);
  }
  .bubble .maps-btn:hover { background: #1558b0; transform: translateY(-1px); }
  .bubble .fb-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--fb-blue); color: #fff;
    border: none; border-radius: 10px;
    padding: 5px 11px; font-size: 12px; font-weight: 500;
    cursor: pointer; margin: 4px 4px 0 0;
    font-family: 'DM Sans', sans-serif;
    transition: background .15s, transform .1s;
    box-shadow: 0 2px 8px rgba(24,119,242,.3);
  }
  .bubble .fb-btn:hover { background: #1160cc; transform: translateY(-1px); }

  .typing-dots span {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink3); margin: 0 2px;
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2){ animation-delay:.2s; }
  .typing-dots span:nth-child(3){ animation-delay:.4s; }
  @keyframes blink{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1);opacity:1}}

  /* ── INPUT BAR ───────────────────────────────────────────────────── */
  .input-bar {
    position: sticky; bottom: 0;
    background: var(--bg);
    padding: 8px 0 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 7px 7px 7px 13px;
    transition: border-color .2s, box-shadow .2s; box-shadow: var(--shadow);
  }
  .input-row:focus-within { border-color: var(--teal-mid); box-shadow: 0 0 0 3px rgba(42,122,106,.1); }
  #userInput {
    flex: 1; border: none; background: transparent; outline: none;
    font-family: 'DM Sans', sans-serif; font-size: 13.5px; color: var(--ink);
    resize: none; max-height: 120px; line-height: 1.5;
  }
  #userInput::placeholder { color: var(--ink3); }
  .send-btn {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--teal); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .18s; color: #fff;
  }
  .send-btn:hover:not(:disabled) { background: var(--teal-mid); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  .footer-bar {
    display: flex; align-items: center; justify-content: space-between; padding-top: 5px;
  }
  .powered { font-size: 10.5px; color: var(--ink3); }
  .powered span { color: var(--gold); font-weight: 500; }
  .secure-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--teal-lt); border: 1px solid #a0d0c8;
    border-radius: 20px; padding: 2px 8px; font-size: 10.5px; color: var(--teal);
  }

  /* ── PANEL DE MAPA ───────────────────────────────────────────────── */
  .map-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    box-shadow: 0 -8px 40px rgba(26,42,26,.16);
    z-index: 100;
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    max-height: 75%;
  }
  .map-panel.open { transform: translateY(0); }
  .map-panel-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 10px auto 0; flex-shrink: 0;
  }
  .map-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px 8px; flex-shrink: 0;
  }
  .map-panel-title {
    font-size: 13.5px; font-weight: 500; color: var(--ink);
    display: flex; align-items: center; gap: 7px;
    max-width: 80%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .map-close {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--bg2); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink2); font-size: 14px; flex-shrink: 0; transition: background .15s;
  }
  .map-close:hover { background: var(--border); }
  .map-actions { display: flex; gap: 8px; padding: 0 16px 10px; flex-shrink: 0; }
  .map-action-btn {
    flex: 1; padding: 7px 10px; border-radius: 10px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .map-action-btn.primary { background: var(--maps-blue); color: #fff; }
  .map-action-btn.primary:hover { background: #1558b0; }
  .map-action-btn.secondary { background: var(--bg2); color: var(--ink2); border: 1px solid var(--border); }
  .map-action-btn.secondary:hover { background: var(--border); }
  .map-frame-wrap { flex: 1; padding: 0 16px 16px; min-height: 0; }
  .map-frame-wrap iframe { width: 100%; height: 100%; min-height: 240px; border: none; border-radius: 12px; background: var(--bg2); }
  .map-overlay {
    position: absolute; inset: 0;
    background: rgba(26,42,26,.35);
    z-index: 99; opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .map-overlay.open { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>
<div class="page-shell">

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo-wrap">
      <img id="logoImg" src="escudo-gad.jpeg" alt="GAD Parroquial Atahualpa"
           onerror="this.style.display='none';document.getElementById('logoFb').style.display='flex'"/>
      <span id="logoFb" class="logo-fallback" style="display:none">🏔️</span>
    </div>
    <div class="header-text">
      <h1>Habaspamba</h1>
      <div class="subtitle" id="subtitleText">Parroquia Rural de Atahualpa · Pichincha, Ecuador</div>
      <div class="bot-name"><span class="bot-dot"></span> Yakuna Bot</div>
    </div>
    <div class="header-right">
      <div class="lang-btns">
        <button class="lang-btn active" id="btnEs" onclick="setLang('es')">🇪🇨 Español</button>
        <button class="lang-btn" id="btnEn" onclick="setLang('en')">🇺🇸 English</button>
      </div>
      <div class="header-badge">GAD Parroquial<br>Atahualpa</div>
    </div>
  </div>
</header>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="status-dot"></div>
  <span class="status-text" id="statusText">Yakuna Bot activo · Habaspamba, Ecuador</span>
</div>

<!-- CHIPS -->
<div class="chips-outer">
  <button class="chips-arrow arr-left" id="arrLeft" onclick="scrollChips(-1)">&#8249;</button>
  <div class="chips-row" id="chipsRow">
    <button class="chip" onclick="askChip(this,'Cuales son los lugares turisticos de Habaspamba?','What are the tourist spots in Habaspamba?')">🏔️ <span class="lbl" data-es="Lugares" data-en="Places">Lugares</span></button>
    <button class="chip" onclick="askChip(this,'Que gastronomia tipica hay en Habaspamba?','What typical food is there in Habaspamba?')">🍽️ <span class="lbl" data-es="Gastronomía" data-en="Food">Gastronomía</span></button>
    <button class="chip" onclick="askChip(this,'Donde puedo hospedarme en Habaspamba?','Where can I stay in Habaspamba?')">🏡 <span class="lbl" data-es="Hospedaje" data-en="Stay">Hospedaje</span></button>
    <button class="chip" onclick="askChip(this,'Cuales son las fiestas y eventos de Habaspamba?','What are the festivals in Habaspamba?')">🎊 <span class="lbl" data-es="Fiestas" data-en="Festivals">Fiestas</span></button>
    <button class="chip" onclick="askChip(this,'Que comercio local hay en Habaspamba?','What local commerce is there in Habaspamba?')">🛍️ <span class="lbl" data-es="Comercio" data-en="Commerce">Comercio</span></button>
    <button class="chip" onclick="askChip(this,'Como llego a Habaspamba desde Quito?','How do I get to Habaspamba from Quito?')">🗺️ <span class="lbl" data-es="Cómo llegar" data-en="Directions">Cómo llegar</span></button>
    <button class="chip" onclick="askChip(this,'Que cascadas hay en Habaspamba?','What waterfalls are there in Habaspamba?')">💧 <span class="lbl" data-es="Cascadas" data-en="Waterfalls">Cascadas</span></button>
  </div>
  <button class="chips-arrow arr-right" id="arrRight" onclick="scrollChips(1)">&#8250;</button>
</div>

<!-- CHAT -->
<div class="chat-wrap">
  <div class="messages" id="messages"></div>
  <div class="input-bar">
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="Escribe tu pregunta sobre Habaspamba..."
        onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="footer-bar">
      <p class="powered">GAD Parroquial <span>Atahualpa · Habaspamba</span></p>
      <div class="secure-badge">🔒 <span id="secureLabel">API segura · Netlify</span></div>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div class="map-overlay" id="mapOverlay" onclick="closeMap()"></div>

<!-- PANEL DE MAPA -->
<div class="map-panel" id="mapPanel">
  <div class="map-panel-handle"></div>
  <div class="map-panel-header">
    <div class="map-panel-title">🗺️ <span id="mapTitle">Ubicación</span></div>
    <button class="map-close" onclick="closeMap()">✕</button>
  </div>
  <div class="map-actions">
    <button class="map-action-btn primary" onclick="openInMaps()">🔗 Abrir en Google Maps</button>
    <button class="map-action-btn secondary" onclick="closeMap()">✕ Cerrar</button>
  </div>
  <div class="map-frame-wrap">
    <iframe id="mapFrame" src="" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>
</div>

</div>

<script>
const API_URL = '/.netlify/functions/chat';
let lang = 'es';
let history = [];
let isLoading = false;
let currentMapUrl = '';

// Chips arrows
const chipsRow = document.getElementById('chipsRow');
const arrLeft  = document.getElementById('arrLeft');
const arrRight = document.getElementById('arrRight');
function updateArrows() {
  arrLeft.classList.toggle('visible',  chipsRow.scrollLeft > 4);
  arrRight.classList.toggle('visible', chipsRow.scrollLeft + chipsRow.clientWidth < chipsRow.scrollWidth - 4);
}
function scrollChips(dir) { chipsRow.scrollBy({ left: dir * 160, behavior: 'smooth' }); }
chipsRow.addEventListener('scroll', updateArrows);
window.addEventListener('resize', updateArrows);
setTimeout(updateArrows, 300);

// Mapa panel
function openMap(query, label) {
  const encoded = encodeURIComponent(query);
  currentMapUrl = 'https://maps.google.com/?q=' + encoded;
  document.getElementById('mapTitle').textContent = label;
  document.getElementById('mapFrame').src = 'https://maps.google.com/maps?q=' + encoded + '&output=embed&z=15&hl=' + lang;
  document.getElementById('mapPanel').classList.add('open');
  document.getElementById('mapOverlay').classList.add('open');
}
function closeMap() {
  document.getElementById('mapPanel').classList.remove('open');
  document.getElementById('mapOverlay').classList.remove('open');
  setTimeout(() => { document.getElementById('mapFrame').src = ''; }, 350);
}
function openInMaps() { window.open(currentMapUrl, '_blank', 'noopener'); }

// i18n
const i18n = {
  es: {
    welcome: 'Hola! Soy <strong>Yakuna Bot</strong> 💧, tu guia turistica virtual de <strong>Habaspamba</strong> (Parroquia Rural de Atahualpa, Pichincha). Mi nombre significa "El camino del Agua". Te puedo ayudar con:<br/>🏔️ Lugares turisticos &nbsp; 🍽️ Gastronomia<br/>🏡 Hospedaje &nbsp; 🎊 Fiestas &nbsp; 🗺️ Como llegar<br/><br/>En que te puedo ayudar hoy?',
    placeholder: 'Escribe tu pregunta sobre Habaspamba...',
    status: 'Yakuna Bot activo · Habaspamba, Ecuador',
    subtitle: 'Parroquia Rural de Atahualpa · Pichincha, Ecuador',
    secure: 'API segura · Netlify',
  },
  en: {
    welcome: 'Hello! I am <strong>Yakuna Bot</strong> 💧, your virtual travel guide for <strong>Habaspamba</strong> (Rural Parish of Atahualpa, Pichincha). My name means "The Water Path". I can help you with:<br/>🏔️ Tourist spots &nbsp; 🍽️ Food<br/>🏡 Stay &nbsp; 🎊 Festivals &nbsp; 🗺️ Directions<br/><br/>How can I help you today?',
    placeholder: 'Ask me about Habaspamba...',
    status: 'Yakuna Bot active · Habaspamba, Ecuador',
    subtitle: 'Rural Parish of Atahualpa · Pichincha, Ecuador',
    secure: 'Secure API · Netlify',
  }
};

window.onload = () => { addBotMsg(i18n[lang].welcome); };

function setLang(newLang) {
  lang = newLang;
  document.getElementById('btnEs').classList.toggle('active', lang === 'es');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  document.getElementById('subtitleText').textContent = i18n[lang].subtitle;
  document.getElementById('statusText').textContent   = i18n[lang].status;
  document.getElementById('secureLabel').textContent  = i18n[lang].secure;
  document.getElementById('userInput').placeholder    = i18n[lang].placeholder;
  document.querySelectorAll('.lbl').forEach(el => el.textContent = el.getAttribute('data-' + lang));
  history = [];
  document.getElementById('messages').innerHTML = '';
  addBotMsg(i18n[lang].welcome);
}

function askChip(btn, textEs, textEn) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  sendText(lang === 'es' ? textEs : textEn);
  setTimeout(() => btn.classList.remove('active'), 800);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function sendMessage() {
  const inp = document.getElementById('userInput');
  const text = inp.value.trim();
  if (!text || isLoading) return;
  inp.value = ''; inp.style.height = 'auto';
  sendText(text);
}

async function sendText(text) {
  if (isLoading) return;
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  addUserMsg(text);
  history.push({ role: 'user', content: text });
  const typing = addTyping();
  try {
    const res  = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, lang })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error ' + res.status);
    history.push({ role: 'assistant', content: data.reply });
    typing.remove();
    addBotMsg(formatMsg(data.reply));
  } catch (err) {
    typing.remove();
    addBotMsg('⚠️ ' + (lang === 'es' ? 'Error al conectar con el servidor' : 'Error connecting to server') + ': ' + err.message);
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

const PLACE_MAP = {
  'iglesia central':     { q: 'Iglesia Central Atahualpa Habaspamba Ecuador',          label: 'Iglesia Central de Habaspamba' },
  'camposanto':          { q: 'Campo Santo Atahualpa Habaspamba Ecuador',               label: 'Camposanto de Habaspamba' },
  'campo santo':         { q: 'Campo Santo Atahualpa Habaspamba Ecuador',               label: 'Camposanto de Habaspamba' },
  'cascada grande':      { q: 'Cascada Grande Rio Mojanda Atahualpa Ecuador',           label: 'Cascada Grande del Rio Mojanda' },
  'cascada el cucho':    { q: 'Cascada El Cucho Atahualpa Pichincha Ecuador',           label: 'Cascada El Cucho' },
  'granja la valentina': { q: 'Granja La Valentina Via Piganta Atahualpa Ecuador',      label: 'Granja La Valentina' },
  'finca don arturo':    { q: 'Finca Don Arturo Atahualpa Ecuador',                     label: 'Finca Don Arturo' },
  'casa mia':            { q: 'Casa Mia Comida Tipica Atahualpa Habaspamba',            label: 'Casa Mia Comida Tipica' },
  'diablo huma':         { q: 'Hostal Diablo Huma Atahualpa Ecuador',                   label: 'El Diablo Huma' },
  'el aliso':            { q: 'El Aliso Bar Restaurant Atahualpa Ecuador',              label: 'El Aliso Bar Restaurant' },
  'palacio del pan':     { q: 'Panaderia El Palacio del Pan Atahualpa Ecuador',         label: 'Panaderia El Palacio del Pan' },
  'bodeguita':           { q: 'La Bodeguita Campestre La Tola Atahualpa Ecuador',       label: 'La Bodeguita Campestre - La Tola' },
  'store t.mk':          { q: '0.1331256,-78.3737583',                                  label: 'Store T.MK' },
  'habaspamba':          { q: 'Atahualpa Habaspamba Pichincha Ecuador',                 label: 'Habaspamba' },
};

function formatMsg(text) {
  let html = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
    .replace(/\n\n/g, '<br/><br/>')
    .replace(/\n/g, '<br/>');

  html = html.replace(
    /(?:Ver en Google Maps:|📍[^:]*:)?\s*(https?:\/\/(?:maps\.google\.com|maps\.app\.goo\.gl)[^\s<"]*)/gi,
    (match, url) => {
      const qMatch = url.match(/[?&]q=([^&"<\s]*)/i);
      const query  = qMatch ? decodeURIComponent(qMatch[1].replace(/\+/g,' ')) : 'Habaspamba Ecuador';
      const label  = getLabelFromQuery(query);
      return '<button class="maps-btn" onclick="openMap(\'' + query.replace(/'/g,"\\'") + '\',\'' + label.replace(/'/g,"\\'") + '\')">🗺️ Ver en mapa</button>';
    }
  );

  html = html.replace(
    /(?:Facebook:)?\s*(https?:\/\/(?:www\.)?facebook\.com[^\s<"]*)/gi,
    '<button class="fb-btn" onclick="window.open(\'$1\',\'_blank\',\'noopener\')">📘 Facebook</button>'
  );

  return html;
}

function getLabelFromQuery(query) {
  const q = query.toLowerCase().trim();
  // Busca por coordenadas exactas primero
  for (const key of Object.keys(PLACE_MAP)) {
    if (PLACE_MAP[key].q === query || q.includes(key)) return PLACE_MAP[key].label;
  }
  // Si son coordenadas puras (números y coma), devuelve nombre genérico
  if (/^-?[\d.]+,-?[\d.]+$/.test(q)) return 'Ubicación en el mapa';
  return query.split(',')[0];
}

function addUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="avatar">Tú</div><div class="bubble">' + escapeHtml(text) + '</div>';
  document.getElementById('messages').appendChild(div);
  scrollBottom();
}

function addBotMsg(html) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="avatar"><img src="escudo-gad.jpeg" alt="" onerror="this.parentElement.innerHTML=\'💧\'"/></div><div class="bubble">' + html + '</div>';
  document.getElementById('messages').appendChild(div);
  scrollBottom();
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="avatar"><img src="escudo-gad.jpeg" alt="" onerror="this.parentElement.innerHTML=\'💧\'"/></div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  document.getElementById('messages').appendChild(div);
  scrollBottom();
  return div;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function scrollBottom() {
  const m = document.getElementById('messages');
  setTimeout(() => m.scrollTop = m.scrollHeight, 50);
}
function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
