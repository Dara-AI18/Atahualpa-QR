<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Yakuna Bot · Guía Turística de Atahualpa</title>
<meta name="description" content="Yakuna Bot - Tu guía turístico virtual de Habaspamba, Atahualpa. Descubre lugares, gastronomía, hospedaje y más."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════════════════════════════
   YAKUNA BOT — DUAL THEME SYSTEM
   ══════════════════════════════════════════════════════════════════ */
:root {
  --page-bg:#dff0f7; --surface:#ffffff; --surface-2:#eaf6fb;
  --border:#a8d8e8; --header-from:#0d4a5e; --header-to:#1a7a9a;
  --primary:#1a6b8a; --primary-hover:#2389a8; --primary-light:#c8e8f2;
  --accent-green:#6ee7b7; --accent-gold:#c49a2a; --accent-gold-light:#fde68a;
  --ink:#0d2d3a; --ink-2:#4a6e7a; --ink-3:#8aacba;
  --user-bubble:#1a6b8a; --bot-bubble:#ffffff; --input-bg:#ffffff;
  --chip-bg:#ffffff; --chip-active:#1a6b8a;
  --glow-rgb:110,231,183; --cursor-rgb:26,107,138;
  --overlay:rgba(13,45,58,0.35);
  --maps-blue:#1a73e8; --fb-blue:#1877f2;
}
[data-theme="dark"] {
  --page-bg:#050e1a; --surface:#0d1f30; --surface-2:#0a1828;
  --border:#1a3a4e; --header-from:#020c16; --header-to:#0a1e2e;
  --primary:#2389a8; --primary-hover:#2ea8cc; --primary-light:#0d2d3a;
  --accent-green:#6ee7b7; --accent-gold:#fde68a;
  --ink:#e0f2f8; --ink-2:#8aacba; --ink-3:#4a6e7a;
  --user-bubble:#0d4a5e; --bot-bubble:#0d1f30; --input-bg:#0a1828;
  --chip-bg:#0d1f30; --chip-active:#1a6b8a;
  --glow-rgb:110,231,183; --cursor-rgb:46,168,204;
  --overlay:rgba(5,14,26,0.5);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
*{transition:background-color .3s ease,color .2s ease,border-color .3s ease}
body{
  font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 20% 50%,var(--primary-light) 0%,var(--page-bg) 40%,var(--page-bg) 100%);
}

/* ── PAGE SHELL ─────────────────────────────── */
.page-shell{
  max-width:640px;width:100%;display:flex;flex-direction:column;
  background:var(--surface);position:relative;overflow:hidden;
  border:1px solid var(--border);height:100vh;height:100dvh;
  animation:borderPulse 4s ease-in-out infinite;
}
@media(min-width:600px)and(max-width:900px){
  .page-shell{border-radius:16px;margin:12px auto;height:calc(100dvh - 24px)}
}
@media(min-width:900px){
  .page-shell{border-radius:28px;margin:20px auto;height:calc(100dvh - 40px);
    box-shadow:0 0 0 1px rgba(var(--glow-rgb),.08),0 32px 80px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.06)}
}
@keyframes borderPulse{
  0%,100%{box-shadow:0 0 0 1px rgba(var(--glow-rgb),.08),0 32px 80px rgba(0,0,0,.18)}
  50%{box-shadow:0 0 0 1px rgba(var(--glow-rgb),.2),0 32px 80px rgba(0,0,0,.25),0 0 40px rgba(var(--glow-rgb),.06)}
}

/* ── HEADER ─────────────────────────────────── */
header{
  background:linear-gradient(145deg,var(--header-from) 0%,var(--header-to) 60%,var(--header-from) 100%);
  padding:18px 20px 16px;position:relative;overflow:hidden;flex-shrink:0;
}
header::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle 200px at 85% 40%,rgba(196,154,42,.08) 0%,transparent 100%);
}
header::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.04) 45%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 55%,transparent 100%);
  animation:shimmer 6s ease-in-out infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%) rotate(15deg)}100%{transform:translateX(200%) rotate(15deg)}}

.header-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:14px;position:relative}

.logo-wrap{
  width:64px;height:64px;border-radius:50%;background:#fff;padding:3px;flex-shrink:0;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 2px var(--accent-gold),0 0 0 6px rgba(196,154,42,.2),0 4px 16px rgba(0,0,0,.3);
  animation:logoSway 6s ease-in-out infinite;
}
.logo-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%}
@keyframes logoSway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}

.header-text{flex:1;min-width:0}
.header-text h1{
  font-family:'Cinzel',serif;font-size:24px;font-weight:700;color:#fff;
  line-height:1.15;letter-spacing:2px;text-shadow:0 0 20px rgba(110,231,183,.5);
}
.header-text .subtitle{font-size:11px;color:rgba(255,255,255,.65);font-weight:500;margin-top:2px;letter-spacing:2px;text-transform:uppercase}
.header-text .bot-status{font-size:10px;color:rgba(255,255,255,.75);margin-top:6px;display:flex;align-items:center;gap:6px}
.status-dot-header{
  width:7px;height:7px;border-radius:50%;background:var(--accent-green);display:inline-block;
  animation:pulseDot 2s ease-in-out infinite;
}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

.header-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.lang-btns{display:flex;gap:6px}
.pill-btn{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  color:rgba(255,255,255,.65);border-radius:20px;padding:4px 12px;font-size:10.5px;
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap;
  display:flex;align-items:center;gap:4px;
}
.pill-btn:hover{background:rgba(255,255,255,.22);color:#fff}
.pill-btn.active{background:rgba(255,255,255,.28);color:#fff;border-color:rgba(255,255,255,.5);font-weight:500}

/* ── WAVE DIVIDER ──────────────────────────── */
.wave-svg{display:block;width:100%;height:20px;opacity:.25;flex-shrink:0}

/* ── STATUS BAR ────────────────────────────── */
.status-bar{
  background:var(--header-from);filter:brightness(.85);
  padding:5px 20px;display:flex;align-items:center;justify-content:center;gap:6px;flex-shrink:0;
}
.status-dot-bar{width:6px;height:6px;border-radius:50%;background:var(--accent-green);animation:pulseDot 2s ease-in-out infinite;flex-shrink:0}
.status-text{font-size:10.5px;color:rgba(255,255,255,.55);letter-spacing:.3px}

/* ── CHIPS ─────────────────────────────────── */
.chips-outer{padding:12px 0 0;position:relative;flex-shrink:0;background:var(--surface-2)}
.chips-arrow{
  position:absolute;top:50%;transform:translateY(-30%);width:28px;height:28px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.1);
  cursor:pointer;display:none;align-items:center;justify-content:center;z-index:3;
  color:var(--ink-2);font-size:16px;opacity:0;pointer-events:none;transition:opacity .2s;
}
@media(min-width:768px){.chips-arrow{display:flex}}
.chips-arrow.visible{opacity:1;pointer-events:auto}
.chips-arrow:hover{background:var(--primary-light);color:var(--primary)}
.chips-arrow.arr-left{left:4px}
.chips-arrow.arr-right{right:4px}
.chips-row{
  display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
  padding:0 18px 12px;scroll-behavior:smooth;
}
.chips-row::-webkit-scrollbar{display:none}
.chip{
  display:flex;align-items:center;gap:6px;background:var(--chip-bg);
  border:1px solid var(--border);border-radius:24px;padding:8px 16px;font-size:13px;
  cursor:pointer;white-space:nowrap;color:var(--primary);flex-shrink:0;
  font-family:'DM Sans',sans-serif;font-weight:500;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.chip .chip-icon{font-size:18px}
.chip:hover{
  background:var(--primary-light);border-color:var(--primary);color:var(--ink);
  transform:translateY(-2px) scale(1.04);box-shadow:0 6px 20px rgba(26,107,138,.2);
}
.chip.active{background:var(--chip-active);border-color:var(--chip-active);color:#fff;transform:scale(.97)}

/* ── CHAT ──────────────────────────────────── */
.chat-wrap{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative}
.messages{
  flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:12px 16px;
  background-image:radial-gradient(var(--border) 1px,transparent 1px);background-size:24px 24px;
}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.msg{display:flex;gap:10px;align-items:flex-end;max-width:92%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.bot{align-self:flex-start}
.msg.bot{animation:slideInLeft .28s cubic-bezier(.34,1.2,.64,1)}
.msg.user{animation:slideInRight .28s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
@keyframes slideInRight{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}

.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.bot .avatar{border:2px solid var(--accent-green);animation:avatarGlow 3s ease-in-out infinite}
.bot .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.user .avatar{background:var(--accent-gold);color:#fff;font-size:10px;font-weight:700;width:32px;height:32px}
@keyframes avatarGlow{
  0%,100%{box-shadow:0 0 0 2px rgba(var(--glow-rgb),.3),0 0 8px rgba(var(--glow-rgb),.15)}
  50%{box-shadow:0 0 0 4px rgba(var(--glow-rgb),.35),0 0 16px rgba(var(--glow-rgb),.25)}
}

.bubble{padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.65}
.bot .bubble{
  background:var(--bot-bubble);border:1px solid var(--border);border-bottom-left-radius:4px;
  color:var(--ink);box-shadow:0 2px 12px rgba(0,0,0,.08);border-left:3px solid var(--accent-green);max-width:88%;
}
.user .bubble{
  background:var(--user-bubble);color:#fff;border-bottom-right-radius:4px;
  box-shadow:0 2px 12px rgba(26,107,138,.25);max-width:88%;
}
.bubble strong{font-weight:600}
.bubble ul{margin:6px 0 0 16px}
.bubble li{margin-bottom:3px}

/* ── INLINE MAP & FB BUTTONS ─────────────── */
.bubble .maps-btn{
  display:inline-flex;align-items:center;gap:5px;background:var(--maps-blue);color:#fff;
  border:none;border-radius:10px;padding:6px 14px;font-size:13px;font-weight:500;
  cursor:pointer;margin:6px 4px 2px 0;font-family:'DM Sans',sans-serif;
  box-shadow:0 3px 10px rgba(26,115,232,.35);animation:btnPop .3s cubic-bezier(.34,1.56,.64,1) forwards;
  transition:background .15s,transform .1s;
}
.bubble .maps-btn:hover{background:#1558b0;transform:translateY(-1px);box-shadow:0 5px 16px rgba(26,115,232,.45)}
.bubble .fb-btn{
  display:inline-flex;align-items:center;gap:5px;background:var(--fb-blue);color:#fff;
  border:none;border-radius:10px;padding:6px 14px;font-size:13px;font-weight:500;
  cursor:pointer;margin:6px 4px 2px 0;font-family:'DM Sans',sans-serif;
  box-shadow:0 3px 10px rgba(24,119,242,.35);animation:btnPop .3s cubic-bezier(.34,1.56,.64,1) forwards;
  transition:background .15s,transform .1s;
}
.bubble .fb-btn:hover{background:#1160cc;transform:translateY(-1px);box-shadow:0 5px 16px rgba(24,119,242,.45)}
@keyframes btnPop{0%{transform:scale(.8);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}

/* ── TYPING DOTS ───────────────────────────── */
.typing-dots span{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--accent-green);margin:0 2px;
  box-shadow:0 0 6px rgba(var(--glow-rgb),.4);
  animation:typingWave 1.4s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes typingWave{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* ── SCROLL TO BOTTOM ──────────────────────── */
.scroll-bottom-btn{
  position:absolute;bottom:8px;right:12px;z-index:20;
  background:var(--primary);color:#fff;border:none;border-radius:50%;
  width:36px;height:36px;cursor:pointer;display:none;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(26,107,138,.4);animation:slideInRight .2s ease;
}
.scroll-bottom-btn.visible{display:flex}
.scroll-bottom-btn:hover{background:var(--primary-hover)}

/* ── INPUT BAR ─────────────────────────────── */
.input-bar{
  background:var(--surface-2);border-top:1px solid var(--border);
  padding:12px 16px calc(16px + env(safe-area-inset-bottom,0px));
  flex-shrink:0;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
}
.input-row{
  display:flex;gap:8px;align-items:flex-end;
  background:var(--input-bg);border:1.5px solid var(--border);
  border-radius:18px;padding:10px 10px 10px 16px;
  transition:border-color .2s,box-shadow .2s;
}
.input-row:focus-within{
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(26,107,138,.12),0 0 20px rgba(110,231,183,.08);
}
#userInput{
  flex:1;border:none;background:transparent;outline:none;
  font-family:'DM Sans',sans-serif;font-size:16px;color:var(--ink);
  resize:none;max-height:140px;line-height:1.5;
}
#userInput::placeholder{color:var(--ink-3)}
.char-count{font-size:10px;color:var(--ink-3);align-self:flex-end;margin-bottom:4px;display:none;flex-shrink:0}
.send-btn{
  width:38px;height:38px;border-radius:12px;background:var(--primary);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;color:#fff;
  box-shadow:0 3px 12px rgba(26,107,138,.4);
}
.send-btn:hover:not(:disabled){background:var(--primary-hover);transform:translateY(-1px);box-shadow:0 5px 16px rgba(26,107,138,.5)}
.send-btn:active:not(:disabled){transform:scale(.94)}
.send-btn:disabled{background:var(--border);cursor:not-allowed;box-shadow:none}
.footer-bar{display:flex;align-items:center;justify-content:space-between;padding-top:8px}
.powered{font-size:11px;color:var(--ink-3)}
.powered span{color:var(--accent-gold);font-weight:500}
.secure-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--primary-light);border:1px solid var(--border);
  border-radius:20px;padding:3px 10px;font-size:11px;color:var(--primary);
}

/* ── MAP PANEL ─────────────────────────────── */
.map-panel{
  position:absolute;bottom:0;left:0;right:0;background:var(--surface);
  border-top:1px solid var(--border);border-radius:24px 24px 0 0;
  box-shadow:0 -12px 50px rgba(0,0,0,.3);z-index:100;
  transform:translateY(100%);transition:transform 380ms cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;max-height:75%;
}
.map-panel.open{transform:translateY(0)}
.map-panel-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0;flex-shrink:0}
.map-panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;flex-shrink:0}
.map-panel-title{font-size:14px;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:8px;max-width:80%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.map-close{
  width:28px;height:28px;border-radius:50%;background:var(--surface-2);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--ink-2);font-size:14px;flex-shrink:0;
}
.map-close:hover{background:var(--border)}
.map-actions{display:flex;gap:8px;padding:0 16px 12px;flex-shrink:0}
.map-action-btn{
  flex:1;padding:8px 12px;border-radius:12px;border:none;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
}
.map-action-btn.primary{background:var(--maps-blue);color:#fff;box-shadow:0 3px 10px rgba(26,115,232,.35)}
.map-action-btn.primary:hover{background:#1558b0}
.map-action-btn.secondary{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--border)}
.map-action-btn.secondary:hover{background:var(--border)}
.map-frame-wrap{flex:1;padding:0 16px 16px;min-height:0}
.map-frame-wrap iframe{width:100%;height:100%;min-height:240px;border:none;border-radius:12px;background:var(--surface-2)}
.map-overlay{
  position:absolute;inset:0;background:var(--overlay);z-index:99;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.map-overlay.open{opacity:1;pointer-events:auto}

/* ── CURSOR GLOW ───────────────────────────── */
#cursor-orb{
  position:fixed;width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle,rgba(var(--cursor-rgb),.5) 0%,transparent 70%);
  mix-blend-mode:screen;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);transition:width .3s,height .3s,opacity .3s;
}
#cursor-dot{
  position:fixed;width:6px;height:6px;border-radius:50%;
  background:var(--accent-green);pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
}

/* ── PARTICLES ─────────────────────────────── */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{
  position:absolute;border-radius:50%;background:var(--accent-green);
  pointer-events:none;opacity:0;
  animation:floatUp var(--dur,12s) linear infinite;animation-delay:var(--delay,0s);
}
@keyframes floatUp{
  0%{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:1}90%{opacity:1}
  100%{transform:translateY(-20px) translateX(var(--drift,20px));opacity:0}
}

/* ── REDUCED MOTION ────────────────────────── */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
}

/* ── TOUCH TARGETS ─────────────────────────── */
button,a{min-height:44px;min-width:44px}
.chip,.pill-btn{min-height:36px}
</style>
</head>
<body>

<!-- PARTICLES (desktop only) -->
<div class="particles" id="particles"></div>

<div class="page-shell">

<!-- HEADER -->
<header>

<script>
/* ══════════════════════════════════════════════════════════════════
   JAVASCRIPT — UNTOUCHED LOGIC (only visual helpers added)

const API_URL = '/.netlify/functions/chat';
let lang = 'es';
let history = [];
let isLoading = false;
let currentMapUrl = '';

/* ── THEME ─────────────────────────────────── */
function initTheme() {
  const stored = localStorage.getItem('yakuna-theme');
  if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('themeBtn').textContent = '☀️ Modo claro';
  }
  window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', e => {
    if (!localStorage.getItem('yakuna-theme')) {
      document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : '');
      document.getElementById('themeBtn').textContent = e.matches ? '☀️ Modo claro' : '🌙 Modo oscuro';
    }
  });
}
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
  localStorage.setItem('yakuna-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙 Modo oscuro' : '☀️ Modo claro';
}

/* ── CURSOR GLOW (desktop only) ────────────── */
function initCursor() {
  if (window.matchMedia('(pointer:coarse)').matches) return;
  const orb = document.createElement('div'); orb.id = 'cursor-orb';
  const dot = document.createElement('div'); dot.id = 'cursor-dot';
  document.body.appendChild(orb); document.body.appendChild(dot);
  let mx=-100,my=-100,ox=-100,oy=-100;
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; dot.style.left=mx+'px'; dot.style.top=my+'px'; });
  document.addEventListener('mouseover', e => {
    const t = e.target;
    if (t.closest('button,a,.chip')) { orb.style.width='60px'; orb.style.height='60px'; orb.style.opacity='1'; }
    else if (t.closest('.bubble')) { orb.style.background='radial-gradient(circle,rgba(196,154,42,.4) 0%,transparent 70%)'; }
  });
  document.addEventListener('mouseout', () => { orb.style.width='40px'; orb.style.height='40px'; orb.style.opacity='.8'; orb.style.background=''; });
  (function loop(){ ox+=(mx-ox)*.12; oy+=(my-oy)*.12; orb.style.left=ox+'px'; orb.style.top=oy+'px'; requestAnimationFrame(loop); })();
}

/* ── PARTICLES (desktop only) ──────────────── */
function initParticles() {
  if (window.innerWidth < 768) return;
  const c = document.getElementById('particles');
  for (let i=0;i<15;i++) {
    const p=document.createElement('div'); p.className='particle';
    const sz=2+Math.random()*3;
    p.style.width=sz+'px'; p.style.height=sz+'px';
    p.style.left=Math.random()*100+'%'; p.style.bottom='0';
    p.style.setProperty('--delay',Math.random()*8+'s');
    p.style.setProperty('--dur',(10+Math.random()*8)+'s');
    p.style.setProperty('--drift',(-30+Math.random()*60)+'px');
    c.appendChild(p);
  }
}

/* ── CHIPS SCROLL ──────────────────────────── */
const chipsRow = document.getElementById('chipsRow');
const arrLeft  = document.getElementById('arrLeft');
const arrRight = document.getElementById('arrRight');
function updateArrows() {
  arrLeft.classList.toggle('visible', chipsRow.scrollLeft > 4);
  arrRight.classList.toggle('visible', chipsRow.scrollLeft + chipsRow.clientWidth < chipsRow.scrollWidth - 4);
}
chipsRow.addEventListener('scroll', updateArrows);
window.addEventListener('resize', updateArrows);
function scrollChips(dir) { chipsRow.scrollBy({ left: dir * 160, behavior: 'smooth' }); }

/* ── SCROLL TO BOTTOM ──────────────────────── */
const messagesEl = document.getElementById('messages');
const scrollBtn = document.getElementById('scrollBtn');
function isNearBottom() { return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 200; }
messagesEl.addEventListener('scroll', () => { scrollBtn.classList.toggle('visible', !isNearBottom()); });
function scrollToBottom() { messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' }); scrollBtn.classList.remove('visible'); }

/* ── i18n ──────────────────────────────────── */
const i18n = {
  es: {
    welcome: 'Hola! Soy <strong>Yakuna Bot</strong> 💧, tu guia turistica virtual de <strong>Habaspamba</strong> (Parroquia Rural de Atahualpa, Pichincha). Mi nombre significa "El camino del Agua". Te puedo ayudar con:<br/>🏔️ Lugares turisticos &nbsp; 🍽️ Gastronomia<br/>🏡 Hospedaje &nbsp; 🎊 Fiestas &nbsp; 🗺️ Como llegar<br/><br/>En que te puedo ayudar hoy?',

    online: 'En línea ahora',
  },
  en: {

window.onload = () => { initTheme(); initCursor(); initParticles(); updateArrows(); addBotMsg(i18n[lang].welcome); };

function setLang(newLang) {
  lang = newLang;
  document.getElementById('btnEs').classList.toggle('active', lang === 'es');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  document.getElementById('subtitleText').textContent = i18n[lang].subtitle;
  document.getElementById('statusText').textContent   = i18n[lang].status;
  document.getElementById('secureLabel').textContent  = i18n[lang].secure;
  document.getElementById('userInput').placeholder    = i18n[lang].placeholder;
  document.getElementById('statusLabel').textContent  = i18n[lang].online;
  document.querySelectorAll('.lbl').forEach(el => el.textContent = el.getAttribute('data-' + lang));
  history = [];
  document.getElementById('messages').innerHTML = '';
  addBotMsg(i18n[lang].welcome);
}

function askChip(btn, textEs, textEn) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  sendText(lang === 'es' ? textEs : textEn);
  setTimeout(() => btn.classList.remove('active'), 800);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function sendMessage() {
  const inp = document.getElementById('userInput');
  const text = inp.value.trim();
  if (!text || isLoading) return;
  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('charCount').style.display = 'none';
  sendText(text);
}

async function sendText(text) {
  if (isLoading) return;
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  addUserMsg(text);
  history.push({ role: 'user', content: text });
  const typing = addTyping();
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, lang })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error ' + res.status);
    history.push({ role: 'assistant', content: data.reply });
    typing.remove();
    addBotMsg(formatMsg(data.reply));
  } catch (err) {
    typing.remove();
    addBotMsg('⚠️ ' + (lang === 'es' ? 'Error al conectar con el servidor' : 'Error connecting to server') + ': ' + err.message);
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function formatMsg(text) {
  let html = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
    .replace(/\n\n/g, '<br/><br/>')
    .replace(/\n/g, '<br/>');

  html = html.replace(
    /(?:Ver en Google Maps:|📍[^:]*:)?\s*(https?:\/\/(?:maps\.google\.com|maps\.app\.goo\.gl)[^\s<"]*)/gi,
    (match, url) => {
      const qMatch = url.match(/[?&]q=([^&"<\s]*)/i);
      const query  = qMatch ? decodeURIComponent(qMatch[1].replace(/\+/g,' ')) : 'Habaspamba Ecuador';
      const label  = getLabelFromQuery(query);
      return '<button class="maps-btn" onclick="openMap(\\\''+ query.replace(/'/g,"\\\\'") +'\\\\\',\\\''+ label.replace(/'/g,"\\\\'") +\'\\\')">🗺️ Ver en mapa</button>';
    }
  );

  html = html.replace(
    /(?:Facebook:)?\s*(https?:\/\/(?:www\.)?facebook\.com[^\s<"]*)/gi,
    '<button class="fb-btn" onclick="window.open(\\\'\$1\\\',\\\'_blank\\\',\\\'noopener\\\')">📘 Facebook</button>'
  );

  return html;
}

function getLabelFromQuery(query) {
  const q = query.toLowerCase().trim();
  for (const key of Object.keys(PLACE_MAP)) {
    if (PLACE_MAP[key].q === query || q.includes(key)) return PLACE_MAP[key].label;
  }
  if (/^-?[\d.]+,-?[\d.]+$/.test(q)) return 'Ubicación en el mapa';
  return query.split(',')[0];
}

function openMap(query, label) {
  const encoded = encodeURIComponent(query);
  currentMapUrl = 'https://maps.google.com/?q=' + encoded;
  document.getElementById('mapTitle').textContent = label;
  document.getElementById('mapFrame').src = 'https://maps.google.com/maps?q=' + encoded + '&output=embed&z=15&hl=' + lang;
  document.getElementById('mapPanel').classList.add('open');
  document.getElementById('mapOverlay').classList.add('open');
}
function closeMap() {
  document.getElementById('mapPanel').classList.remove('open');
  document.getElementById('mapOverlay').classList.remove('open');
  setTimeout(() => { document.getElementById('mapFrame').src = ''; }, 380);
}
function openInMaps() { window.open(currentMapUrl, '_blank', 'noopener'); }

function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function scrollBottom() { const m=document.getElementById('messages'); setTimeout(()=>m.scrollTo({top:m.scrollHeight,behavior:'smooth'}),50); }
function autoGrow(el) {

}
